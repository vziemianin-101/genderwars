  { photo: "gc_3",      answer: "GC",      options: ["Natalie 💕", "GC 💪", "A Raptors fan 🤷"],   focusX: 50, focusY: 18, hint: "Drip check 🏀" },
  { photo: "natalie_4", answer: "Natalie", options: ["Natalie 💕", "GC 💪", "A wine influencer 🤷"], focusX: 55, focusY: 22, hint: "Vineyard vibes 🍷" },
  { photo: "gc_nat_1",  answer: "GC",      options: ["The one on the left 👈", "The one on the right 👉", "Neither — photobomber 🤷"], focusX: 66, focusY: 24, hint: "Formal duo 🎩 — which one is GC?" },
];

const WILDCARDS = [
  { emoji: "🪨", title: "Rock Paper Scissors", challenge: "Cowboys send one rep, Cowgirls send one rep. Best of 3 Rock Paper Scissors. No coaching from the sidelines. Losing team takes a drink. Quickest wildcard in the deck — let's go." },
  { emoji: "🎤", title: "Impression Round", challenge: "Cowboys send ONE person to do their best GC impression. Cowgirls send ONE person to do theirs. Natalie is the sole judge. No arguments. Her word is final. Winning team gets 2 points." },
  { emoji: "🎲", title: "Most Likely To", challenge: "Host reads 5 'most likely to' statements about the couple — e.g. most likely to finish the last snack, cry at the airport, get lost on holiday. Both teams vote Natalie or GC for each. Couple reveals their real answers. Every match earns a point for that team." },
  { emoji: "🎨", title: "Blind Artist", challenge: "Natalie picks any object in the room and describes it out loud for 45 seconds — no saying what it is. One rep from each team draws it with their eyes closed at the same time. Natalie judges whose drawing is closest. That team wins a point — drawings stay up all night." },
  { emoji: "👜", title: "Handbag Oracle", challenge: "Both teams write down 3 things currently in Natalie's handbag. Natalie checks right now. The team with the most correct answers wins 2 points." },
  { emoji: "🏃", title: "Scavenger Sprint", challenge: "First team to run and bring back three things wins 2 points: something the same colour as Natalie's eyes, something GC would definitely own, and something they would both love. First team back with all three wins. GO." },
  { emoji: "💃", title: "Move Like Her", challenge: "GC has 45 seconds to demonstrate Natalie's signature dance move. Natalie scores it out of 10. Under 6 and Cowboys drink. 6 or above and Cowgirls drink. A perfect 10 and everyone drinks to celebrate." },
  { emoji: "🃏", title: "Deal Breaker", challenge: "Host reads 3 outrageous scenarios — e.g. GC wants to move to a farm, Natalie gets a pet snake, they have to give up wine forever. Natalie and GC secretly hold thumbs up or down at the same time. Room bets on whether they'll agree. Every matching answer = everyone drinks." },
  { emoji: "🤝", title: "Sync or Swim", challenge: "Natalie and GC sit back to back. Host asks them 3 rapid questions — they answer simultaneously by holding up fingers. Every matching answer gets a cheer from the room. If all 3 match, each team picks one person to drink." },
  { emoji: "🧃", title: "Never Have I Ever", challenge: "Host reads 5 statements about things Natalie and GC might have done together — e.g. 'Never have I ever been kicked out of a venue.' If you know they've done it, drink. Natalie and GC confirm after each one. Anyone wrong on all 5 finishes their drink." },
  { emoji: "🧩", title: "Finish the Story", challenge: "Host reads out: 'The moment Natalie knew GC was the one was when he…' Each team has 60 seconds to finish the story. Natalie picks the version closest to the truth. That team wins a point." },
  { emoji: "🎵", title: "Finish the Lyrics", challenge: "Host plays 3 seconds of a song and cuts it. First person to correctly sing the next line picks someone to drink. First team to nail 3 songs wins a bonus point. Host controls the playlist — no taking requests." },
  { emoji: "🌍", title: "Around the World", challenge: "Go around the circle naming countries. Each one must start with the last letter of the previous country. Pause more than 5 seconds, repeat one, or get it wrong — you drink. No Google. No excuses." },
  { emoji: "🤫", title: "Broken Telephone", challenge: "Host whispers a ridiculous sentence about Natalie and GC into one ear. It travels around the full room in whispers. Whatever comes out the other end is read aloud. The funniest difference from the original means that person picks someone to drink." },
];

const ZOOM_LEVELS = [7, 4.5, 3, 1.8, 1];
const roundOf = (idx) => QUESTIONS[idx]?.round;

function App() {
  const [screen, setScreen]         = useState("start");  // start | quiz | photo | finish
  const [current, setCurrent]       = useState(0);
  const [phase, setPhase]           = useState("intro");
  const [photoCurrent, setPhotoCurrent] = useState(0);
  const [photoPhase, setPhotoPhase] = useState("intro");
  const [zoomIdx, setZoomIdx]       = useState(0);
  const [scores, setScores]         = useState({ t1: 0, t2: 0 });
  const [awarded, setAwarded]       = useState({ t1: false, t2: false });
  const [wildcard, setWildcard]     = useState(null);
  const [usedWildcards, setUsedWildcards] = useState([]);

  const q     = QUESTIONS[current];
  const total = QUESTIONS.length;
  const round = ROUND_INFO[q?.round] || ROUND_INFO["Easy Round"];

  const pq    = PHOTO_QUESTIONS[photoCurrent];
  const ptotal = PHOTO_QUESTIONS.length;

  const awardPoint = (team) => {
    if (awarded[team]) return;
    const other = team === "t1" ? "t2" : "t1";
    if (awarded[other]) return; // other team already scored this question
    setScores(s => ({ ...s, [team]: s[team] + 1 }));
    setAwarded(a => ({ ...a, [team]: true }));
  };

  const drawWildcard = () => {
    // Always serve Rock Paper Scissors (index 0) as the very first wildcard
    if (usedWildcards.length === 0) {
      setUsedWildcards([0]);
      setWildcard(WILDCARDS[0]);
      return;
    }
    const remaining = WILDCARDS.filter((_, i) => !usedWildcards.includes(i));
    const pool = remaining.length > 0 ? remaining : WILDCARDS.filter((_, i) => i !== 0);
    if (remaining.length === 0) { setUsedWildcards([0]); }
    const idx = Math.floor(Math.random() * pool.length);
    const actualIdx = WILDCARDS.indexOf(pool[idx]);
    setUsedWildcards(u => [...u, actualIdx]);
    setWildcard(pool[idx]);
  };

  const nextQuestion = () => {
    const nextIdx = current + 1;
    if (nextIdx >= total) {
      setScreen("photo");
      setPhotoPhase("intro");
      setPhotoCurrent(0);
      setAwarded({ t1: false, t2: false });
      return;
    }
    const newRound = roundOf(nextIdx) !== roundOf(current);
    setCurrent(nextIdx);
    setAwarded({ t1: false, t2: false });
    setPhase(newRound ? "intro" : "question");
  };

  const nextPhoto = () => {
    const nextIdx = photoCurrent + 1;
    if (nextIdx >= ptotal) { setScreen("finish"); return; }
    setPhotoCurrent(nextIdx);
    setZoomIdx(0);
    setAwarded({ t1: false, t2: false });
    setPhotoPhase("question");
  };

  // ── START / INSTRUCTIONS ─────────────────────────────────────────────────
  if (screen === "start") {
    const rounds = [
      { emoji: "🟢", label: "Easy Round",      desc: "1 question · Multiple choice · Ease into the rodeo" },
      { emoji: "🟡", label: "Medium Round",     desc: "5 questions · Multiple choice · Boots in the stirrups" },
      { emoji: "💀", label: "High Risk Round",  desc: "10 questions · Multiple choice · No filter. No mercy. Yeehaw." },
      { emoji: "📸", label: "Photo Round",      desc: "10 photos · Zoom in to out · Guess who it is" },
    ];
    const rules = [
      { emoji: "🤠", text: `${COUPLE.team1} vs ${COUPLE.team2} — compete on every question` },
      { emoji: "🙋", text: "Shout your answer out loud — host taps to award the point" },
      { emoji: "✅", text: "Only one team scores per question — Natalie & GC decide who got it first" },
      { emoji: "📸", text: "Photo Round: tap Zoom Out to reveal more — fewer zooms = more bragging rights" },
      { emoji: "🃏", text: "Wildcard button appears after every question — draw one any time for a chaos challenge" },
      { emoji: "🍺", text: "Drinking rules: losing team drinks after each question — simple as that" },
    ];
    return (
      <div style={{ ...S.page, justifyContent: "center" }}>
        <div style={{ maxWidth: 600, width: "100%", boxSizing: "border-box" }}>
          {/* Header */}
          <div style={{ textAlign: "center", marginBottom: 28 }}>
            <div style={{ fontSize: 52, marginBottom: 10 }}>🤠</div>
            <h1 style={{ fontSize: 30, fontWeight: 900, color: "#fff", margin: "0 0 6px", letterSpacing: "-0.02em" }}>
              Gender Wars 🤠
            </h1>
            <p style={{ fontSize: 16, color: "#ffffffaa", margin: 0 }}>
              Nashville Edition · {COUPLE.team1} vs {COUPLE.team2} 🎸
            </p>
          </div>

          {/* Rounds overview */}
          <div style={{ background: "#ffffff0d", border: "1px solid #ffffff1a", borderRadius: 18, padding: "18px 20px", marginBottom: 14 }}>
            <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: "0.1em", textTransform: "uppercase", color: "#ffffff55", marginBottom: 14 }}>The Game</div>
            <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
              {rounds.map((r, i) => (
                <div key={i} style={{ display: "flex", alignItems: "center", gap: 12 }}>
                  <span style={{ fontSize: 20, flexShrink: 0 }}>{r.emoji}</span>
                  <div>
                    <div style={{ fontSize: 14, fontWeight: 700, color: "#fff" }}>{r.label}</div>
                    <div style={{ fontSize: 12, color: "#ffffff66" }}>{r.desc}</div>
                  </div>
                </div>
              ))}
            </div>
          </div>

          {/* Rules */}
          <div style={{ background: "#ffffff0d", border: "1px solid #ffffff1a", borderRadius: 18, padding: "18px 20px", marginBottom: 22 }}>
            <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: "0.1em", textTransform: "uppercase", color: "#ffffff55", marginBottom: 14 }}>How It Works</div>
            <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
              {rules.map((r, i) => (
                <div key={i} style={{ display: "flex", alignItems: "flex-start", gap: 12 }}>
                  <span style={{ fontSize: 18, flexShrink: 0, marginTop: 1 }}>{r.emoji}</span>
                  <p style={{ fontSize: 13, color: "#ffffffcc", margin: 0, lineHeight: 1.5 }}>{r.text}</p>
                </div>
              ))}
            </div>
          </div>

          {/* Start button */}
          <div style={{ textAlign: "center" }}>
            <button style={{ ...S.btnPrimary, fontSize: 18, padding: "16px 48px" }} onClick={() => setScreen("quiz")}>
              Let's Go 🤠
            </button>
          </div>
        </div>
      </div>
    );
  }

  // ── FINISHED ─────────────────────────────────────────────────────────────
  if (screen === "finish") {
    const winner = scores.t1 > scores.t2 ? COUPLE.team1 : scores.t2 > scores.t1 ? COUPLE.team2 : null;
    return (
      <div style={S.page}>
        <div style={S.finishCard}>
          <div style={{ fontSize: 60, marginBottom: 12 }}>🏆</div>
          <h1 style={S.finishTitle}>Yeehaw! That's a wrap! 🤠</h1>
          <p style={S.finishSub}>{winner ? `${winner} ride off into the sunset! 🌅🤠` : "It's a tie — y'all are equally obsessed with these two 🤠"}</p>
          <div style={S.finalRow}>
            <ScoreBox label={COUPLE.team1} pts={scores.t1} color="#c9921a" />
            <span style={{ color: "#ffffff33", fontWeight: 800, fontSize: 18 }}>VS</span>
            <ScoreBox label={COUPLE.team2} pts={scores.t2} color="#d63864" />
          </div>
          <button style={S.btnPrimary} onClick={() => { setCurrent(0); setPhase("intro"); setScores({ t1:0, t2:0 }); setAwarded({ t1:false, t2:false }); setScreen("start"); setPhotoCurrent(0); setZoomIdx(0); setUsedWildcards([]); }}>Play Again</button>
        </div>
      </div>
    );
  }

  // ── PHOTO ROUND ──────────────────────────────────────────────────────────
  if (screen === "photo") {
    const pr = ROUND_INFO["Photo Round"];

    if (photoPhase === "intro") {
      return (
        <div style={S.page}>
          {wildcard && <WildcardModal card={wildcard} onClose={() => { setWildcard(null); setAwarded({ t1: false, t2: false }); }} scores={scores} awarded={awarded} awardPoint={awardPoint} COUPLE={COUPLE} />}
          <div style={{ ...S.introCard, borderColor: pr.color + "66" }}>
            <div style={{ fontSize: 60 }}>{pr.emoji}</div>
            <div style={{ ...S.introLabel, color: pr.color }}>PHOTO ROUND</div>
            <p style={S.introDesc}>We zoom in tight. You shout who it is. Tap to reveal more. First to get it right wins.</p>
            <p style={{ color: "#ffffff44", fontSize: 13, margin: "0 0 30px" }}>{ptotal} photos</p>
            <button style={{ ...S.btnPrimary, background: pr.color, color: "#111" }} onClick={() => setPhotoPhase("question")}>Let's Go →</button>
          </div>
        </div>
      );
    }

    const zoom = ZOOM_LEVELS[zoomIdx];
    const revealed = photoPhase === "revealed" || photoPhase === "score";

    return (
      <div style={S.page}>
        {wildcard && <WildcardModal card={wildcard} onClose={() => { setWildcard(null); setAwarded({ t1: false, t2: false }); }} scores={scores} awarded={awarded} awardPoint={awardPoint} COUPLE={COUPLE} />}

        {/* Score bar */}
        <div style={S.scoreBar}>
          <TeamScore label={COUPLE.team1} pts={scores.t1} color="#c9921a" align="left" />
          <div style={S.progressGroup}>
            <div style={S.dots}>
              {PHOTO_QUESTIONS.map((_, i) => (
                <div key={i} style={{ ...S.dot, background: i < photoCurrent ? pr.color : i === photoCurrent ? "#fff" : "#ffffff22", transform: i === photoCurrent ? "scale(1.5)" : "scale(1)" }} />
              ))}
            </div>
            <div style={S.counter}>Photo {photoCurrent + 1} / {ptotal}</div>
          </div>
          <TeamScore label={COUPLE.team2} pts={scores.t2} color="#d63864" align="right" />
        </div>

        <div style={S.card}>
          <div style={{ ...S.roundBadge, color: pr.color, borderColor: pr.color + "44", background: pr.dim }}>
            {pr.emoji} PHOTO ROUND · Zoom {zoomIdx + 1}/5
          </div>

          <p style={{ ...S.qText, marginBottom: 12 }}>{pq.hint}</p>

          {/* Photo zoom container */}
          <div style={{ width: "100%", maxWidth: 340, margin: "0 auto 16px", borderRadius: 16, overflow: "hidden", aspectRatio: "3/4", position: "relative", background: "#000", boxShadow: "0 0 0 2px " + pr.color + "55" }}>
            <img
              src={PHOTOS[pq.photo]}
              alt="Who is this?"
              style={{
                width: "100%", height: "100%",
                objectFit: "cover",
                transform: `scale(${zoom})`,
                transformOrigin: `${pq.focusX}% ${pq.focusY}%`,
                transition: "transform 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94)",
                display: "block",
              }}
            />
            {/* Zoom level indicator */}
            <div style={{ position: "absolute", top: 10, right: 10, background: "#00000088", borderRadius: 20, padding: "4px 10px", fontSize: 12, color: "#fff", fontWeight: 700 }}>
              {zoom}x
            </div>
          </div>

          {/* Options */}
          <div style={S.optGrid}>
            {pq.options.map((opt, i) => {
              const correct = opt.includes(pq.answer);
              return (
                <div key={i} style={{
                  ...S.optCard,
                  borderColor:  revealed ? (correct ? "#4ade80" : "#ffffff15") : "#ffffff30",
                  background:   revealed ? (correct ? "#4ade8020" : "#ffffff06") : "#ffffff10",
                  opacity:      revealed && !correct ? 0.35 : 1,
                  transform:    revealed && correct  ? "scale(1.02)" : "scale(1)",
                }}>
                  {revealed && correct && <span style={S.tick}>✓</span>}
                  <span style={{ ...S.optText, color: revealed && correct ? "#4ade80" : "#fff" }}>{opt}</span>
                </div>
              );
            })}
          </div>

          {/* Controls */}
          {photoPhase === "question" && (
            <div style={{ display: "flex", gap: 10, justifyContent: "center", flexWrap: "wrap" }}>
              {zoomIdx < ZOOM_LEVELS.length - 1 && (
                <button style={{ ...S.btnSecondary, borderColor: pr.color, color: pr.color }} onClick={() => setZoomIdx(z => z + 1)}>
                  🔍 Zoom Out
                </button>
              )}
              <button style={S.btnPrimary} onClick={() => setPhotoPhase("revealed")}>Reveal Answer →</button>
            </div>
          )}

          {photoPhase === "revealed" && (
            <div style={S.btnRow}>
              <button style={S.btnPrimary} onClick={() => setPhotoPhase("score")}>Award Points →</button>
            </div>
          )}

          {photoPhase === "score" && (
            <>
              <p style={S.hint}>Natalie & GC — who got it first?</p>
              <div style={S.awardRow}>
                {[{ key: "t1", label: COUPLE.team1, color: "#c9921a" }, { key: "t2", label: COUPLE.team2, color: "#d63864" }].map(({ key, label, color }) => {
                  const won = awarded[key];
                  const other = key === "t1" ? "t2" : "t1";
                  const locked = awarded[other];
                  return (
                    <button key={key} onClick={() => awardPoint(key)} style={{ border: `2px solid ${locked ? "#ffffff22" : color}`, borderRadius: 50, padding: "12px 22px", fontSize: 14, fontWeight: 700, cursor: won || locked ? "default" : "pointer", background: won ? color : "transparent", color: won ? "#fff" : locked ? "#ffffff33" : color, minWidth: 140, transition: "all 0.2s", opacity: locked && !won ? 0.4 : 1 }}>
                      {won ? `✓ ${label} +1` : `${label} +1`}
                    </button>
                  );
                })}
              </div>
              <div style={{ display: "flex", gap: 10, justifyContent: "center", flexWrap: "wrap", marginTop: 8 }}>
                <button style={{ ...S.btnSecondary, borderColor: "#fbbf24", color: "#fbbf24" }} onClick={drawWildcard}>🃏 Wildcard</button>
                <button style={S.btnPrimary} onClick={nextPhoto}>{photoCurrent + 1 >= ptotal ? "See Final Results 🏆" : "Next Photo →"}</button>
              </div>
            </>
          )}
        </div>
      </div>
    );
  }

  // ── ROUND INTRO ───────────────────────────────────────────────────────────
  if (phase === "intro") {
    const roundQCount = QUESTIONS.filter(x => x.round === q.round).length;
    const desc = { "Easy Round": "Saddle up, partner — warm up round before the real rodeo begins 🤠", "Medium Round": "Boots in the stirrups — do y'all actually know these two? 🎸", "High Risk Round": "No filter. No mercy. This is Nashville — buckle up 💀🤠" }[q.round];
    return (
      <div style={S.page}>
        {wildcard && <WildcardModal card={wildcard} onClose={() => { setWildcard(null); setAwarded({ t1: false, t2: false }); }} scores={scores} awarded={awarded} awardPoint={awardPoint} COUPLE={COUPLE} />}
        <div style={{ ...S.introCard, borderColor: round.color + "66" }}>
          <div style={{ fontSize: 60 }}>{round.emoji}</div>
          <div style={{ ...S.introLabel, color: round.color }}>{round.label}</div>
          <p style={S.introDesc}>{desc}</p>
          <p style={{ color: "#ffffff44", fontSize: 13, margin: "0 0 30px" }}>{roundQCount} questions</p>
          <button style={{ ...S.btnPrimary, background: round.color, color: "#111" }} onClick={() => setPhase("question")}>Let's Go →</button>
        </div>
      </div>
    );
  }

  // ── QUIZ ROUND ────────────────────────────────────────────────────────────
  return (
    <div style={S.page}>
      {wildcard && <WildcardModal card={wildcard} onClose={() => { setWildcard(null); setAwarded({ t1: false, t2: false }); }} scores={scores} awarded={awarded} awardPoint={awardPoint} COUPLE={COUPLE} />}

      <div style={S.scoreBar}>
        <TeamScore label={COUPLE.team1} pts={scores.t1} color="#c9921a" align="left" />
        <div style={S.progressGroup}>
          <div style={S.dots}>
            {QUESTIONS.map((_, i) => (
              <div key={i} style={{ ...S.dot, background: i < current ? round.color : i === current ? "#fff" : "#ffffff22", transform: i === current ? "scale(1.5)" : "scale(1)" }} />
            ))}
          </div>
          <div style={S.counter}>{current + 1} / {total}</div>
        </div>
        <TeamScore label={COUPLE.team2} pts={scores.t2} color="#d63864" align="right" />
      </div>

      <div style={S.card}>
        <div style={{ ...S.roundBadge, color: round.color, borderColor: round.color + "44", background: round.dim }}>{round.emoji} {round.label}</div>
        {q.answeredBy && <div style={S.mcTag}>{q.answeredBy} answered this about {q.subject}</div>}
        <div style={{ ...S.qBox, borderLeftColor: round.color }}><p style={S.qText}>{q.q}</p></div>

        <div style={S.optGrid}>
          {q.options.map((opt, i) => {
            const correct  = opt === q.answer;
            const revealed = phase === "revealed" || phase === "score";
            return (
              <div key={i} style={{ ...S.optCard, borderColor: revealed ? (correct ? "#4ade80" : "#ffffff15") : "#ffffff30", background: revealed ? (correct ? "#4ade8020" : "#ffffff06") : "#ffffff10", opacity: revealed && !correct ? 0.35 : 1, transform: revealed && correct ? "scale(1.02)" : "scale(1)" }}>
                {revealed && correct && <span style={S.tick}>✓</span>}
                <span style={{ ...S.optText, color: revealed && correct ? "#4ade80" : "#fff" }}>{opt}</span>
              </div>
            );
          })}
        </div>

        {q.funNote && (phase === "revealed" || phase === "score") && <div style={S.funNote}>💬 {q.funNote}</div>}

        {phase === "question" && <div style={S.btnRow}><button style={S.btnPrimary} onClick={() => setPhase("revealed")}>Reveal Answer →</button></div>}
        {phase === "revealed" && <div style={S.btnRow}><button style={S.btnPrimary} onClick={() => setPhase("score")}>Award Points →</button></div>}

        {phase === "score" && (
          <>
            <p style={S.hint}>Natalie & GC — who got it first?</p>
            <div style={S.awardRow}>
              {[{ key: "t1", label: COUPLE.team1, color: "#c9921a" }, { key: "t2", label: COUPLE.team2, color: "#d63864" }].map(({ key, label, color }) => {
                const won = awarded[key];
                const other = key === "t1" ? "t2" : "t1";
                const locked = awarded[other];
                return (
                  <button key={key} onClick={() => awardPoint(key)} style={{ border: `2px solid ${locked ? "#ffffff22" : color}`, borderRadius: 50, padding: "12px 24px", fontSize: 14, fontWeight: 700, cursor: won || locked ? "default" : "pointer", background: won ? color : "transparent", color: won ? "#fff" : locked ? "#ffffff33" : color, minWidth: 145, transition: "all 0.2s", opacity: locked && !won ? 0.4 : 1 }}>
                    {won ? `✓ ${label} +1` : `${label} +1`}
                  </button>
                );
              })}
            </div>
            <div style={{ display: "flex", gap: 10, justifyContent: "center", flexWrap: "wrap", marginTop: 8 }}>
              <button style={{ ...S.btnSecondary, borderColor: "#fbbf24", color: "#fbbf24" }} onClick={drawWildcard}>🃏 Wildcard</button>
              <button style={S.btnPrimary} onClick={nextQuestion}>{current + 1 >= total ? "Photo Round 📸 →" : "Next Question →"}</button>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

function WildcardModal({ card, onClose, scores, awarded, awardPoint, COUPLE }) {
  return (
    <div style={{ position: "fixed", inset: 0, background: "#00000099", zIndex: 100, display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }}>
      <div style={{ background: "linear-gradient(135deg, #1a0900, #2d1600)", border: "2px solid #fbbf24", borderRadius: 24, padding: "32px 24px", maxWidth: 440, width: "100%", textAlign: "center", boxShadow: "0 0 40px #fbbf2444" }}>
        <div style={{ fontSize: 52 }}>{card.emoji}</div>
        <div style={{ fontSize: 22, fontWeight: 800, color: "#fbbf24", margin: "10px 0 14px", letterSpacing: "0.03em" }}>{card.title}</div>
        <p style={{ fontSize: 15, color: "#ffffffcc", lineHeight: 1.6, margin: "0 0 22px" }}>{card.challenge}</p>

        {/* Score bar inside modal */}
        <div style={{ display: "flex", justifyContent: "center", gap: 16, marginBottom: 18 }}>
          <div style={{ textAlign: "center" }}>
            <div style={{ fontSize: 11, fontWeight: 700, color: "#c9921a", textTransform: "uppercase", letterSpacing: "0.08em" }}>{COUPLE.team1}</div>
            <div style={{ fontSize: 28, fontWeight: 800, color: "#fff" }}>{scores.t1}</div>
          </div>
          <div style={{ fontSize: 16, color: "#ffffff33", fontWeight: 800, alignSelf: "center" }}>VS</div>
          <div style={{ textAlign: "center" }}>
            <div style={{ fontSize: 11, fontWeight: 700, color: "#d63864", textTransform: "uppercase", letterSpacing: "0.08em" }}>{COUPLE.team2}</div>
            <div style={{ fontSize: 28, fontWeight: 800, color: "#fff" }}>{scores.t2}</div>
          </div>
        </div>

        {/* Award points */}
        <p style={{ fontSize: 12, color: "#ffffff66", margin: "0 0 12px" }}>Award a point if someone nailed the challenge</p>
        <div style={{ display: "flex", gap: 10, justifyContent: "center", marginBottom: 18, flexWrap: "wrap" }}>
          {[{ key: "t1", label: COUPLE.team1, color: "#c9921a" }, { key: "t2", label: COUPLE.team2, color: "#d63864" }].map(({ key, label, color }) => {
            const won = awarded[key];
            const other = key === "t1" ? "t2" : "t1";
            const locked = awarded[other];
            return (
              <button key={key} onClick={() => awardPoint(key)} style={{ border: `2px solid ${locked ? "#ffffff22" : color}`, borderRadius: 50, padding: "10px 20px", fontSize: 13, fontWeight: 700, cursor: won || locked ? "default" : "pointer", background: won ? color : "transparent", color: won ? "#fff" : locked ? "#ffffff33" : color, minWidth: 130, transition: "all 0.2s", opacity: locked && !won ? 0.4 : 1 }}>
                {won ? `✓ ${label} +1` : `${label} +1`}
              </button>
            );
          })}
        </div>

        <button style={{ ...S.btnPrimary, background: "#fbbf24", color: "#111" }} onClick={onClose}>Done — Back to the game</button>
      </div>
    </div>
  );
}

function TeamScore({ label, pts, color, align }) {
  return (
    <div style={{ textAlign: align, minWidth: 82 }}>
      <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: "0.08em", textTransform: "uppercase", color }}>{label}</div>
      <div style={{ fontSize: 30, fontWeight: 800, color: "#fff", lineHeight: 1.1 }}>{pts}</div>
    </div>
  );
}

function ScoreBox({ label, pts, color }) {
  return (
    <div style={{ textAlign: "center", border: `2px solid ${color}`, borderRadius: 14, padding: "14px 22px", background: color + "18", minWidth: 100 }}>
      <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: "0.08em", textTransform: "uppercase", color, marginBottom: 6 }}>{label}</div>
      <div style={{ fontSize: 44, fontWeight: 800, color: "#fff", lineHeight: 1 }}>{pts}</div>
      <div style={{ fontSize: 11, color: "#ffffff55", marginTop: 2 }}>pts</div>
    </div>
  );
}
